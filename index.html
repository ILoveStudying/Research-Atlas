    function installStaticSidebar() {
      var nav = document.querySelector('.sidebar-nav');
      if (!nav) {
        return;
      }
      nav.innerHTML = STATIC_SIDEBAR_HTML;
      nav.querySelectorAll('a').forEach(function(anchor) {
        var href = anchor.getAttribute('href') || '';
        if (href.indexOf('#/') === 0) {
          anchor.setAttribute('data-route', href.slice(2));
        }
      });
    }

    function installSidebarRouter() {
      if (window.__avIndustrySidebarRouterInstalled) {
        return;
      }
      window.__avIndustrySidebarRouterInstalled = true;
      document.addEventListener('click', function(event) {
        var target = event.target;
        var anchor = target && target.closest ? target.closest('.sidebar-nav a[data-route]') : null;
        if (!anchor) {
          return;
        }
        event.preventDefault();
        event.stopPropagation();
        var route = anchor.getAttribute('data-route') || '';
        window.location.hash = route ? '#/' + route : '#/';
      }, true);
    }

    function normalizeLinks(scope, base) {
      document.querySelectorAll(scope + ' a[href]').forEach(function(anchor) {
        var href = anchor.getAttribute('href');
        if (!href || href.indexOf('://') > -1 || href.indexOf('//') === 0 || href.indexOf('#/') === 0 || href.indexOf('mailto:') === 0) {
          return;
        }
        if (href.indexOf('.md') === -1) {
          return;
        }
        var parts = href.split('#');
        var path = parts[0];
        var hash = parts[1] ? '?id=' + parts[1] : '';
        var segments = path.charAt(0) === '/'
          ? path.slice(1).split('/')
          : base.concat(path.split('/'));
        var normalized = [];
        segments.forEach(function(segment) {
          if (!segment || segment === '.') {
            return;
          }
          if (segment === '..') {
            normalized.pop();
            return;
          }
          normalized.push(segment);
        });
        var routePath = normalized.join('/').replace(/\.md$/, '');
        anchor.setAttribute('href', '#/' + routePath + hash);
      });
    }

    function normalizeDataRouteLinks() {
      document.querySelectorAll('a[data-route]').forEach(function(anchor) {
        var route = anchor.getAttribute('data-route') || '';
        route = route.replace(/^#\/?/, '').replace(/^\/+/, '');
        anchor.setAttribute('href', route ? '#/' + route : '#/');
      });
    }

    function normalizeMarkdownLinks() {
      var route = (window.location.hash || '#/README')
        .replace(/^#\/?/, '')
        .split('?')[0]
        .split('#')[0];
      var base = route.split('/');
      base.pop();
      normalizeDataRouteLinks();
      normalizeLinks('.markdown-section', base);
      normalizeLinks('.sidebar-nav', []);
      normalizeDataRouteLinks();
    }
    window.$docsify = {
      name: 'av-industry-radar',
      repo: 'ILoveStudying/Research-Atlas',
      loadSidebar: true,
      relativePath: false,
      subMaxLevel: 2,
      search: 'auto',
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function(hook) {
          hook.mounted(function() {
            installSidebarRouter();
            installStaticSidebar();
            normalizeMarkdownLinks();
          });
          hook.doneEach(function() {
            installSidebarRouter();
            installStaticSidebar();
            mermaid.run({ querySelector: '.mermaid' });
            normalizeMarkdownLinks();
            setTimeout(function() {
              installStaticSidebar();
              normalizeMarkdownLinks();
            }, 100);
          });
        }
      ]
    };
