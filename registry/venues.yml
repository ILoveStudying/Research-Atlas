tiers:
  A1:
    说明: 核心顶会主会论文，优先精读、消化和复现。
    例子: [NeurIPS, ICML, ICLR, CVPR, ICCV, ECCV, KDD, WWW, SIGIR, ACL, EMNLP, AAAI, IJCAI, ICDE]
  A2:
    说明: 强相关会议、顶刊、领域顶会，适合作为专题对比和补充。
    例子: [WSDM, CIKM, ICDM, ICRA, IROS, CoRL, TPAMI, TKDE, TNNLS]
  B:
    说明: 高质量 workshop、系统论文、代表性 arXiv，适合作为实现和方向参考。
    例子: [Workshop, arXiv, Technical Report]
  S:
    说明: Survey、benchmark、tutorial、产业系统，单独跟踪其地图价值。
    例子: [Survey, Benchmark, Tutorial, Industry System]

