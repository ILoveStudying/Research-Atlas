核心贡献:
  - 使用 Diffusion Transformer 统一开放世界城市时空学习。
  - 支持双向预测、时间插值、空间外推和时空补全。
  - 用 mask strategy 和 unified prompt learning 指定任务并增强 denoising。
时空token相关性:
  - 将不同城市时空数据类型统一为模型可处理的数据格式。
  - 通过 time patch、stride、t_patch_len、prompt 和 diffusion step 等配置控制时空表示。
