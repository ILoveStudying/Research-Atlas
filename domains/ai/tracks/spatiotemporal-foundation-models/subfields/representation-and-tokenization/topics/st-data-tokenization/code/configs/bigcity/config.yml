# BIGCity 配置快照
# 这里记录影响 ST-unit、ST tokenizer、数据集和训练行为的关键参数。

项目名: BIGCity
状态: 已从 README 和 requirements.txt 抽取初始复现配置，未实际运行
代码路径: ../../github/bigcity
数据:
  城市: [BJ, XA, CD]
  轨迹数据: 北京出租车轨迹、XA/CD 网约车轨迹
  交通状态数据: 基于 OSM 路网和轨迹 map-matching 生成，时间片 30 分钟
  数据集链接: https://huggingface.co/datasets/XieYuBUAA/BIGCity_Dataset/tree/main
  checkpoint链接: https://huggingface.co/XieYuBUAA/BIGCity/tree/main
表示:
  st_unit: 将轨迹与交通状态统一为从动态路网采样得到的序列单元
  tokenizer: 静态道路编码器 + 动态交通状态编码器 + 融合编码器
训练:
  python: 3.12.9
  batch_size: 32
  learning_rate: 2e-4
  train_epochs: 20
  mask_rate: 0.5
  stage1: pretrain.py
  stage2: finetune.py
  日志: wandb
