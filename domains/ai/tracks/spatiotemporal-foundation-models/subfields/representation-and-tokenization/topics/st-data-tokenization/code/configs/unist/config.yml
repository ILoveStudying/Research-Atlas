# UniST 配置快照

项目名: UniST
状态: 已从 README 和 requirements.txt 抽取初始复现配置，未实际运行
代码路径: ../../github/unist
数据:
  数据说明: code/github/unist/dataset/README.md
  支持数据形态: [Grid, Graph]
任务:
  - short-term prediction
  - long-term prediction
  - few-shot prediction
  - zero-shot prediction
表示与prompt:
  prompt_ST: "0 表示不启用 prompt tuning，1 表示启用 prompt tuning"
  prompt_content: ["s_p_c", "s", "c", "p", "s_c", "s_p", "p_c"]
  num_memory_spatial: 512
  num_memory_temporal: 512
训练:
  python: ">=3.9"
  torch: "2.0.0+cu117"
  pretrain入口: src/main.py
  prompt_tuning入口: src/main.py
  learning_rate: 3e-4
  his_len: 6
  pred_len: 6

