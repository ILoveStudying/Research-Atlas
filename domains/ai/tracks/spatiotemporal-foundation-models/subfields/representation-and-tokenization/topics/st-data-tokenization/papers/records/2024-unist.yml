核心贡献:
  - 提出 prompt-empowered universal model，用时空知识 prompt 支持城市时空预测。
  - 覆盖短期预测、长期预测、few-shot 和 zero-shot 场景。
  - 面向 grid/graph 数据形态，强调跨场景泛化。
时空token相关性:
  - 通过时空知识 prompt 和 memory pool 将空间、时间、周期和上下文信息接入统一模型。
  - 可作为 BIGCity ST-token 与 UrbanDiT prompt/patch 方案之间的过渡基线。
局限:
  - README 显示 model weights still coming soon，需要继续跟踪权重可用性。
  - 需要核验多数据集下载、路径组织和 zero-shot 脚本。
